# prometheus.yml — Prometheus configuration for the Solr 10.x monitoring stack.
#
# Used by the docker-compose.yml stack (solr/monitoring/docker-compose.yml).
# For non-Docker deployments, change the target from "solr:8983" to your
# actual Solr host:port (e.g., "localhost:8983" or "solr-host.example.com:8983").

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules are loaded from the rules directory.
rule_files:
  - /etc/prometheus/rules/solr-alerts.yml

scrape_configs:
  - job_name: solr
    # NOTE: The dev stack uses solr:10 (10.0.0) which only exposes /solr/admin/metrics.
    # Production Solr 10.1+ exposes the shorter /api/metrics endpoint (use that instead).
    metrics_path: /solr/admin/metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['solr1:8983', 'solr2:8983']
    # Uncomment and adjust the relabel_configs block below to add "environment"
    # and "cluster" labels to all Solr metrics. These labels are required for
    # the Grafana dashboard's $environment and $cluster template variables to
    # show meaningful values. Without them, both dropdowns show "All" which
    # still works — all panels match all series.
    #
    # relabel_configs:
    #   - target_label: environment
    #     replacement: prod        # change to: dev, staging, prod, etc.
    #   - target_label: cluster
    #     replacement: cluster-1   # change to a unique name for this Solr cluster
