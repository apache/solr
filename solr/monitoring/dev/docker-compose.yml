# ============================================================================
# DEVELOPER CONVENIENCE ONLY — NOT FOR PRODUCTION USE
# ============================================================================
#
# This docker-compose stack is provided solely to make it easy for contributors
# to view and test changes to the two monitoring artifacts:
#
#   ../grafana-solr-dashboard.json    — Grafana dashboard (main artifact)
#   ../prometheus-solr-alerts.yml     — Prometheus alert rules (main artifact)
#
# It is NOT intended as a reference deployment or a recommended production setup.
# For integrating these artifacts into your own Prometheus + Grafana installation,
# see the Solr Reference Guide (monitoring-with-prometheus-and-grafana.adoc).
#
# Usage:
#   cd solr/monitoring/dev
#   docker-compose up -d
#
# Services:
#   solr1        http://localhost:8983  (SolrCloud node 1, embedded ZooKeeper)
#   solr2        http://localhost:8984  (SolrCloud node 2)
#   Prometheus   http://localhost:9090
#   Grafana      http://localhost:3000  (admin / admin)
#   Alertmanager http://localhost:9093
#   trafficgen   (no port — continuously indexes/searches the 'test' collection)
#
# Prometheus may show scrape errors for the first 30-60 seconds while Solr starts.
# ============================================================================

services:
  solr1:
    image: solr:10
    ports:
      - "8983:8983"
      - "9983:9983"   # embedded ZooKeeper (Solr 10 default: ZK_PORT = SOLR_PORT + 1000)
    # No ZK_HOST set: Solr 10 defaults to SolrCloud with embedded ZooKeeper on port 9983.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  solr2:
    image: solr:10
    ports:
      - "8984:8983"
    environment:
      ZK_HOST: "solr1:9983"
    depends_on:
      solr1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus-solr-alerts.yml:/etc/prometheus/rules/solr-alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      solr1:
        condition: service_healthy
      solr2:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana-solr-dashboard.json:/var/lib/grafana/dashboards/grafana-solr-dashboard.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  trafficgen:
    build: ./trafficgen
    environment:
      SOLR_URL: http://solr1:8983/solr
    depends_on:
      solr1:
        condition: service_healthy
      solr2:
        condition: service_healthy
    restart: unless-stopped
