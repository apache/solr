apply plugin: 'java-library'

description = 'Open Telemetry (OTEL) tracer and OTLP exporter'

dependencies {
  implementation platform(project(':platform'))
  implementation project(':solr:core')

  implementation platform(libs.opentelemetry.bom)

  implementation libs.slf4j.api

  implementation libs.opentelemetry.api
  implementation libs.opentelemetry.sdk
  implementation libs.opentelemetry.sdk.metrics
  implementation libs.opentelemetry.sdk.extension.autoconfigure
  implementation(libs.opentelemetry.exporter.otlp) {
    // Exclude the OkHttp-based sender; we use the JDK HTTP sender to reduce transitive dependencies
    exclude group: 'io.opentelemetry', module: 'opentelemetry-exporter-sender-okhttp'
  }
  // End users must recompile with jaeger exporter and/or zipkin exporter if they need these

  // NOTE: sdk-autoconfigure needs both opentelemetry-sdk-metrics and opentelemetry-sdk-logs even if we don't use them

  // JDK HTTP sender (Java 11+) — avoids pulling in OkHttp and gRPC transitive dependencies.
  // gRPC transport is not supported out of the box; users who need it can add the required
  // gRPC and OkHttp artifacts to the opentelemetry module's lib directory.
  runtimeOnly libs.opentelemetry.exporter.sender.jdk
  // See https://issues.apache.org/jira/browse/LOG4J2-3609 due to needing these annotations
  compileOnly libs.apache.tomcat.annotationsapi

  testImplementation project(':solr:test-framework')
  testImplementation project(':solr:solrj-jetty')
  testImplementation libs.carrotsearch.randomizedtesting.runner
  testImplementation libs.junit.junit
  testImplementation libs.opentelemetry.sdk.trace
  testImplementation libs.opentelemetry.sdk.testing
  testImplementation libs.opentelemetry.sdk.extension.autoconfigure.spi
}
