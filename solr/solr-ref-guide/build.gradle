// NOTE: The full reference-guide build relies on the 'com.github.jruby-gradle.base'
// plugin (v2.0.0), whose transitive dependencies (org.ysb33r.gradle:grolifant:0.12 and
// com.burgstaller:okhttp-digest:1.10) only ever existed on JCenter, which has been shut
// down and is unavailable from Maven Central / the Gradle Plugin Portal. To allow the
// rest of the build (and the test tasks) to configure with public repositories only,
// this module is reduced to a minimal java stub. It still exists as :solr:solr-ref-guide
// so the various `configure(project(":solr:solr-ref-guide"))` hooks elsewhere keep working,
// but it no longer builds the HTML guide. Restore the original to build the docs again.

plugins {
    id 'java'
}

description = 'Solr reference guide (doc build disabled: jruby/JCenter deps unavailable)'
