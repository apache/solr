title: >
  Remove Dropwizard Metrics as a *direct* Solr dependency.
  The `OVERSEERSTATUS` response no longer includes per-operation timing metrics, albeit the counters `requests` and `errors` remain.
  Users needing per-operation timing can use distributed tracing as a substitute.
  Nonetheless, Solr still includes dropwizard-metrics for embedding ZooKeeper.
type: removed
